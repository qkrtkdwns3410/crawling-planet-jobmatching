name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      module:
        description: '배포 대상'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - app
          - api

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ec2-user
  SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}
  CRAWLING_ADMIN_TOKEN: ${{ secrets.CRAWLING_ADMIN_TOKEN }}
  JOBPLANET_EMAIL: ${{ secrets.JOBPLANET_EMAIL }}
  JOBPLANET_PASSWORD: ${{ secrets.JOBPLANET_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build module-app
        if: inputs.module == 'all' || inputs.module == 'app'
        run: ./gradlew :module-app:bootJar --no-daemon

      - name: Build module-api
        if: inputs.module == 'all' || inputs.module == 'api'
        run: ./gradlew :module-api:bootJar --no-daemon

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare EC2 environment
        run: |
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo mkdir -p /opt/crawling-planet && sudo chown ec2-user:ec2-user /opt/crawling-planet"
          printf '[Unit]\nDescription=Crawling Planet - Crawler App (port 8080)\nAfter=postgresql.service network.target\nRequires=postgresql.service\n\n[Service]\nType=simple\nUser=ec2-user\nWorkingDirectory=/opt/crawling-planet\nExecStart=/usr/bin/java -Xms256m -Xmx768m -XX:MaxDirectMemorySize=384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -jar /opt/crawling-planet/app.jar --spring.profiles.active=prod\nRestart=on-failure\nRestartSec=10\nEnvironment=DB_USERNAME=postgres\nEnvironment=DB_PASSWORD=%s\nEnvironment=SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/jobplanet\nEnvironment=CRAWLING_ADMIN_TOKEN=%s\nEnvironment=JOBPLANET_EMAIL=%s\nEnvironment=JOBPLANET_PASSWORD=%s\n\n[Install]\nWantedBy=multi-user.target\n' "$DB_PASSWORD" "$CRAWLING_ADMIN_TOKEN" "$JOBPLANET_EMAIL" "$JOBPLANET_PASSWORD" > /tmp/crawling-planet-app.service
          printf '[Unit]\nDescription=Crawling Planet - API Server (port 8081)\nAfter=postgresql.service network.target\nRequires=postgresql.service\n\n[Service]\nType=simple\nUser=ec2-user\nWorkingDirectory=/opt/crawling-planet\nExecStart=/usr/bin/java -Xms128m -Xmx384m -XX:MaxDirectMemorySize=128m -XX:+UseG1GC -jar /opt/crawling-planet/api.jar --spring.profiles.active=prod\nRestart=on-failure\nRestartSec=10\nEnvironment=DB_USERNAME=postgres\nEnvironment=DB_PASSWORD=%s\nEnvironment=SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/jobplanet\nEnvironment=API_KEY=%s\n\n[Install]\nWantedBy=multi-user.target\n' "$DB_PASSWORD" "$API_KEY" > /tmp/crawling-planet-api.service
          scp -i ~/.ssh/deploy_key /tmp/crawling-planet-app.service $EC2_USER@$EC2_HOST:/tmp/
          scp -i ~/.ssh/deploy_key /tmp/crawling-planet-api.service $EC2_USER@$EC2_HOST:/tmp/
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo mv /tmp/crawling-planet-app.service /etc/systemd/system/ && sudo mv /tmp/crawling-planet-api.service /etc/systemd/system/ && sudo systemctl daemon-reload"

      - name: Setup swap and PostgreSQL tuning
        run: |
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST bash << 'EOF'
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 1G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            grep -q 'vm.swappiness=10' /etc/sysctl.conf || echo 'vm.swappiness=10' | sudo tee -a /etc/sysctl.conf
            sudo sysctl -p

            PG_CONF=/var/lib/pgsql/data/postgresql.conf
            if [ -f "$PG_CONF" ]; then
              sudo sed -i "s/^max_connections = .*/max_connections = 30/" "$PG_CONF"
              grep -q "^effective_cache_size" "$PG_CONF" || echo "effective_cache_size = 512MB" | sudo tee -a "$PG_CONF"
              sudo systemctl restart postgresql
            fi
          EOF

      - name: Deploy module-app
        if: inputs.module == 'all' || inputs.module == 'app'
        run: |
          scp -i ~/.ssh/deploy_key module-app/build/libs/module-app-0.0.1.jar $EC2_USER@$EC2_HOST:/opt/crawling-planet/app.jar
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo systemctl restart crawling-planet-app"

      - name: Deploy module-api
        if: inputs.module == 'all' || inputs.module == 'api'
        run: |
          scp -i ~/.ssh/deploy_key module-api/build/libs/module-api-0.0.1.jar $EC2_USER@$EC2_HOST:/opt/crawling-planet/api.jar
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo systemctl restart crawling-planet-api"

      - name: Update Nginx /health/api location
        if: inputs.module == 'all' || inputs.module == 'api'
        run: |
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST bash << 'EOF'
            NGINX_CONF=/etc/nginx/conf.d/crawling-planet.conf
            if ! sudo grep -q 'location = /health/api' "$NGINX_CONF"; then
              sudo python3 -c "
conf = open('/etc/nginx/conf.d/crawling-planet.conf').read()
insert = '    location = /health/api {\n        proxy_pass http://127.0.0.1:8081/health;\n    }\n\n'
conf = conf.replace('    location = /health/nginx', insert + '    location = /health/nginx')
open('/etc/nginx/conf.d/crawling-planet.conf', 'w').write(conf)
"
              sudo nginx -t && sudo systemctl reload nginx
              echo "Nginx /health/api configured"
            else
              echo "Nginx /health/api already exists, skipping"
            fi
          EOF

      - name: Health check
        run: |
          sleep 20
          if [ "${{ inputs.module }}" != "api" ]; then
            ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "curl -sf http://localhost:8080/api/crawling/status" && echo " -> app OK" || echo " -> app FAIL"
          fi
          if [ "${{ inputs.module }}" != "app" ]; then
            ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "curl -sf http://localhost:8081/api/ext/company/search?name=test" && echo " -> api OK" || echo " -> api FAIL"
          fi
