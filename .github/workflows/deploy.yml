name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      module:
        description: '배포 대상'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - app
          - api

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ec2-user
  SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}
  CRAWLING_ADMIN_TOKEN: ${{ secrets.CRAWLING_ADMIN_TOKEN }}
  JOBPLANET_EMAIL: ${{ secrets.JOBPLANET_EMAIL }}
  JOBPLANET_PASSWORD: ${{ secrets.JOBPLANET_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build module-app
        if: inputs.module == 'all' || inputs.module == 'app'
        run: ./gradlew :module-app:bootJar --no-daemon

      - name: Build module-api
        if: inputs.module == 'all' || inputs.module == 'api'
        run: ./gradlew :module-api:bootJar --no-daemon

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare EC2 environment
        run: |
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo mkdir -p /opt/crawling-planet && sudo chown ec2-user:ec2-user /opt/crawling-planet"
          printf '[Unit]\nDescription=Crawling Planet - Crawler App (port 8080)\nAfter=postgresql.service network.target\nRequires=postgresql.service\n\n[Service]\nType=simple\nUser=ec2-user\nWorkingDirectory=/opt/crawling-planet\nExecStart=/usr/bin/java -Xms512m -Xmx768m -jar /opt/crawling-planet/app.jar --spring.profiles.active=prod\nRestart=on-failure\nRestartSec=10\nEnvironment=DB_USERNAME=postgres\nEnvironment=DB_PASSWORD=%s\nEnvironment=SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/jobplanet\nEnvironment=CRAWLING_ADMIN_TOKEN=%s\nEnvironment=JOBPLANET_EMAIL=%s\nEnvironment=JOBPLANET_PASSWORD=%s\n\n[Install]\nWantedBy=multi-user.target\n' "$DB_PASSWORD" "$CRAWLING_ADMIN_TOKEN" "$JOBPLANET_EMAIL" "$JOBPLANET_PASSWORD" > /tmp/crawling-planet-app.service
          printf '[Unit]\nDescription=Crawling Planet - API Server (port 8081)\nAfter=postgresql.service network.target\nRequires=postgresql.service\n\n[Service]\nType=simple\nUser=ec2-user\nWorkingDirectory=/opt/crawling-planet\nExecStart=/usr/bin/java -Xms256m -Xmx512m -jar /opt/crawling-planet/api.jar --spring.profiles.active=prod\nRestart=on-failure\nRestartSec=10\nEnvironment=DB_USERNAME=postgres\nEnvironment=DB_PASSWORD=%s\nEnvironment=SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/jobplanet\nEnvironment=API_KEY=%s\n\n[Install]\nWantedBy=multi-user.target\n' "$DB_PASSWORD" "$API_KEY" > /tmp/crawling-planet-api.service
          scp -i ~/.ssh/deploy_key /tmp/crawling-planet-app.service $EC2_USER@$EC2_HOST:/tmp/
          scp -i ~/.ssh/deploy_key /tmp/crawling-planet-api.service $EC2_USER@$EC2_HOST:/tmp/
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo mv /tmp/crawling-planet-app.service /etc/systemd/system/ && sudo mv /tmp/crawling-planet-api.service /etc/systemd/system/ && sudo systemctl daemon-reload"

      - name: Deploy module-app
        if: inputs.module == 'all' || inputs.module == 'app'
        run: |
          scp -i ~/.ssh/deploy_key module-app/build/libs/module-app-0.0.1.jar $EC2_USER@$EC2_HOST:/opt/crawling-planet/app.jar
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo systemctl restart crawling-planet-app"

      - name: Deploy module-api
        if: inputs.module == 'all' || inputs.module == 'api'
        run: |
          scp -i ~/.ssh/deploy_key module-api/build/libs/module-api-0.0.1.jar $EC2_USER@$EC2_HOST:/opt/crawling-planet/api.jar
          ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "sudo systemctl restart crawling-planet-api"

      - name: Health check
        run: |
          sleep 20
          if [ "${{ inputs.module }}" != "api" ]; then
            ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "curl -sf http://localhost:8080/api/crawling/status" && echo " -> app OK" || echo " -> app FAIL"
          fi
          if [ "${{ inputs.module }}" != "app" ]; then
            ssh -i ~/.ssh/deploy_key $EC2_USER@$EC2_HOST "curl -sf http://localhost:8081/api/ext/company/search?name=test" && echo " -> api OK" || echo " -> api FAIL"
          fi
