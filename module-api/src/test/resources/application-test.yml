spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobplanet_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

api:
  security:
    key: test-api-key

logging:
  level:
    root: WARN
    com.crawling.planet: INFO
