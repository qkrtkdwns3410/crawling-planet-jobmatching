spring:
  application:
    name: crawling-planet-jobmatching
  
  # 프로필 설정
  profiles:
    active: local

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

# 로깅 설정
logging:
  level:
    root: INFO
    com.crawling.planet: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

