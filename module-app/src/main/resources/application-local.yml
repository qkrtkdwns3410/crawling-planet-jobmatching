spring:
  application:
    name: crawling-planet-jobmatching

# 잡플래닛 크롤링 설정
# VM 옵션으로 오버라이드 가능: -Djobplanet.email=xxx -Djobplanet.password=xxx
jobplanet:
  email: ${JOBPLANET_EMAIL}
  password: ${JOBPLANET_PASSWORD}
  login-url: https://www.jobplanet.co.kr/user-session/sign-in?_nav=gb
  base-url: https://www.jobplanet.co.kr
  # 크롤러 설정
  crawler:
    headless: false  # true: 브라우저 숨김, false: 브라우저 표시
    timeout-seconds: 30
    implicit-wait-seconds: 10
