<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #333;
    }
    h2 { font-size: 15px; margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #00c362;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #00a854; }
    .msg { margin-top: 10px; font-size: 12px; text-align: center; color: #2e7d32; }
  </style>
</head>
<body>
  <h2>API 설정</h2>
  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="API Key를 입력하세요">
  <label for="apiBase">API Server URL</label>
  <input type="text" id="apiBase" placeholder="https://crawling-planet.cc">
  <button id="saveBtn">저장</button>
  <div id="msg" class="msg"></div>
  <script src="options.js"></script>
</body>
</html>
